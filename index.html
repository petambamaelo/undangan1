<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Undangan Digital</title>

<style>
body {
  margin: 0;
  font-family: 'Georgia', serif;
  background: #0f0f0f;
  color: white;
  scroll-behavior: smooth;
}

.section {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
  padding: 20px;
  opacity: 0;
  transform: translateY(50px);
  transition: all 1s ease;
}

.section.show {
  opacity: 1;
  transform: translateY(0);
}

.hero {
  background: linear-gradient(to bottom, #000000aa, #000000aa), url('foto1.jpg') center/cover;
}

h1 {
  font-size: 32px;
  letter-spacing: 2px;
}

h2 {
  font-weight: normal;
}

.button {
  padding: 12px 20px;
  background: gold;
  border-radius: 8px;
  margin-top: 20px;
  text-decoration: none;
  color: black;
}

/* OPENING */
.opening {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100vh;
  background: linear-gradient(to bottom, #000000cc, #000000cc), url('foto1.jpg') center/cover;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  z-index: 9999;
  color: white;
}

.opening-content h1 {
  font-size: 28px;
  margin: 10px 0;
}

.opening-content button {
  padding: 12px 20px;
  background: gold;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  margin-top: 20px;
}

/* ISI */
<div id="content">

  <div class="section hero">
    <h1>Undangan Pernikahan</h1>
    <p>Dengan penuh sukacita kami mengundang Anda</p>
  </div>

  <div class="section">
    <h1>Andi & Sari</h1>
    <p>Putra & Putri</p>
  </div>

  <div class="section">
    <h2>Sabtu, 20 Desember 2026</h2>
    <p>Pukul 10.00 WITA</p>
  </div>

  <div class="section">
    <h2>Lokasi Acara</h2>
    <a class="button" href="https://maps.google.com" target="_blank">Buka Maps</a>
  </div>

</div>

<!-- OPENING -->
<div id="opening" class="opening">
  <div class="opening-content">
    <h2>Kepada Yth:</h2>
    <h1 id="Agnes">Tamu Undangan</h1>
    <p>Di Tempat</p>

    <button onclick="bukaUndangan()">Buka Undangan</button>
  </div>
</div>

<!-- ISI UNDANGAN -->
<div id="content">

  <div class="section">
    <h1>Undangan Pernikahan</h1>
    <p>Kami mengundang Anda untuk hadir di acara kami</p>
  </div>

  <div class="section">
    <h2>Novry & Miaa</h2>
    <p>Putra & Putri</p>
  </div>

  <div class="section">
    <h2>Waktu Acara</h2>
    <p>Sabtu, 20 Desember 2026</p>
    <p>Pukul 10.00 WITA</p>
  </div>

  <div class="section">
    <h2>Lokasi</h2>
    <a href="https://maps.google.com" target="_blank">Klik Lokasi</a>
  </div>

</div>

<script>
// tombol buka undangan
function bukaUndangan() {
  document.getElementById("opening").style.display = "none";
  document.getElementById("content").style.display = "block";

  window.scrollTo({
    top: 0,
    behavior: "smooth"
  });
}

// ambil nama dari link
const urlParams = new URLSearchParams(window.location.search);
const nama = urlParams.get('to');

if (nama) {
  document.getElementById("namaTamu").innerText = nama;
}
<script>
const sections = document.querySelectorAll('.section');

window.addEventListener('scroll', () => {
  sections.forEach(sec => {
    const top = sec.getBoundingClientRect().top;
    if (top < window.innerHeight - 100) {
      sec.classList.add('show');
    }
  });
});
</script>

</body>
</html>
