<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Undangan Digital</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
}

/* OPENING */
.opening {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100vh;
  background: linear-gradient(to bottom, #000000cc, #000000cc), url('foto1.jpg') center/cover;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  z-index: 9999;
  color: white;
}

.opening-content h1 {
  font-size: 28px;
  margin: 10px 0;
}

.opening-content button {
  padding: 12px 20px;
  background: gold;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  margin-top: 20px;
}

/* ISI */
#content {
  display: none;
  padding: 40px 20px;
  text-align: center;
}

.section {
  margin-bottom: 50px;
}
</style>
</head>

<body>

<!-- OPENING -->
<div id="opening" class="opening">
  <div class="opening-content">
    <h2>Kepada Yth:</h2>
    <h1 id="Agnes">Tamu Undangan</h1>
    <p>Di Tempat</p>

    <button onclick="bukaUndangan()">Buka Undangan</button>
  </div>
</div>

<!-- ISI UNDANGAN -->
<div id="content">

  <div class="section">
    <h1>Undangan Pernikahan</h1>
    <p>Kami mengundang Anda untuk hadir di acara kami</p>
  </div>

  <div class="section">
    <h2>Novry & Miaa</h2>
    <p>Putra & Putri</p>
  </div>

  <div class="section">
    <h2>Waktu Acara</h2>
    <p>Sabtu, 20 Desember 2026</p>
    <p>Pukul 10.00 WITA</p>
  </div>

  <div class="section">
    <h2>Lokasi</h2>
    <a href="https://maps.google.com" target="_blank">Klik Lokasi</a>
  </div>

</div>

<script>
// tombol buka undangan
function bukaUndangan() {
  document.getElementById("opening").style.display = "none";
  document.getElementById("content").style.display = "block";

  window.scrollTo({
    top: 0,
    behavior: "smooth"
  });
}

// ambil nama dari link
const urlParams = new URLSearchParams(window.location.search);
const nama = urlParams.get('to');

if (nama) {
  document.getElementById("namaTamu").innerText = nama;
}
</script>

</body>
</html>
